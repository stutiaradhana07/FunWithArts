{% extends "admin/change_form.html" %}
{% block extrahead %}{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Syne:wght@400;700&family=Lato:wght@300;400;700&family=Inter:wght@400;600;700&family=Outfit:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof tinymce === 'undefined') return;

  // Real-time content synchronizer with TinyMCE
  tinymce.init({
    selector: 'textarea.rich-text-editor',
    menubar: false,
    plugins: 'autolink lists link charmap preview',
    toolbar: 'undo redo | bold italic underline | fontsizeselect forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | removeformat | preview',
    toolbar_mode: 'wrap',
    branding: false,
    element_format: 'html',
    forced_root_block: 'p',
    content_style: 'body { font-family: system-ui, sans-serif; font-size: 16px; }',
    setup: function (editor) {
      editor.on('init', function () {
        const content = editor.getContent();
        if (content.trim()) {
          const previewContent = document.getElementById('preview-content');
          if (previewContent) previewContent.innerHTML = content;
        }
        // Apply current font styling inside editor on initialization
        updateContentFont();
      });
      editor.on('change keyup undo redo', function () {
        const previewContent = document.getElementById('preview-content');
        if (previewContent) {
          const content = editor.getContent();
          previewContent.innerHTML = content || '<p style="color: #94a3b8; font-style: italic;">Start typing in the content editor to see your post body layout here...</p>';
        }
      });
    }
  });

  // Color swatches presets integration next to color picker
  const colorInput = document.getElementById('id_title_color');
  if (colorInput) {
    const swatchesWrapper = document.createElement('div');
    swatchesWrapper.className = 'color-presets-wrapper';
    swatchesWrapper.style.cssText = 'display: inline-flex; flex-wrap: wrap; gap: 8px; margin-left: 15px; vertical-align: middle; align-items: center;';

    const presets = [
      { name: 'Charcoal', value: '#1e293b' },
      { name: 'Rose', value: '#e11d48' },
      { name: 'Emerald', value: '#059669' },
      { name: 'Royal Blue', value: '#2563eb' },
      { name: 'Warm Amber', value: '#d97706' },
      { name: 'Vibrant Violet', value: '#7c3aed' },
      { name: 'Deep Teal', value: '#0d9488' }
    ];

    presets.forEach(p => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.title = p.name;
      swatch.style.cssText = `width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #cbd5e1; background-color: ${p.value}; cursor: pointer; padding: 0; transition: transform 0.1s ease;`;
      swatch.addEventListener('mouseover', () => swatch.style.transform = 'scale(1.15)');
      swatch.addEventListener('mouseout', () => swatch.style.transform = 'scale(1)');
      swatch.addEventListener('click', () => {
        colorInput.value = p.value;
        colorInput.dispatchEvent(new Event('input'));
        colorInput.dispatchEvent(new Event('change'));
      });
      swatchesWrapper.appendChild(swatch);
    });

    colorInput.parentNode.appendChild(swatchesWrapper);
  }

  // Preview data bindings
  const titleInput = document.getElementById('id_title');
  const boldCheckbox = document.getElementById('id_title_is_bold');
  const italicCheckbox = document.getElementById('id_title_is_italic');
  const fontSizeSelect = document.getElementById('id_title_font_size');
  const titleFontFamilySelect = document.getElementById('id_title_font_family');
  const excerptFontFamilySelect = document.getElementById('id_excerpt_font_family');
  const contentFontFamilySelect = document.getElementById('id_content_font_family');
  const excerptInput = document.getElementById('id_excerpt');
  const coverImageInput = document.getElementById('id_cover_image');
  const coverPositionInput = document.getElementById('id_cover_image_position');
  const authorSelect = document.getElementById('id_author');

  const previewTitle = document.getElementById('preview-title');
  const previewAuthor = document.getElementById('preview-author');
  const previewDate = document.getElementById('preview-date');
  const previewExcerpt = document.getElementById('preview-excerpt');
  const previewExcerptContainer = document.getElementById('preview-excerpt-container');
  const previewCoverImage = document.getElementById('preview-cover-image');
  const previewCoverPlaceholder = document.getElementById('preview-cover-placeholder');

  function updateTitle() {
    if (!previewTitle) return;
    const text = titleInput ? titleInput.value.trim() : '';
    previewTitle.textContent = text || 'Untitled Post';

    previewTitle.style.fontWeight = (boldCheckbox && boldCheckbox.checked) ? '700' : '400';
    previewTitle.style.fontStyle = (italicCheckbox && italicCheckbox.checked) ? 'italic' : 'normal';
    previewTitle.style.fontSize = (fontSizeSelect && fontSizeSelect.value) ? fontSizeSelect.value : '40px';
    previewTitle.style.fontFamily = (titleFontFamilySelect && titleFontFamilySelect.value) ? titleFontFamilySelect.value : "'Outfit', 'Inter', system-ui, sans-serif";
    previewTitle.style.color = (colorInput && colorInput.value) ? colorInput.value : '#1e293b';
  }

  function updateExcerpt() {
    if (!previewExcerpt || !previewExcerptContainer) return;
    const text = excerptInput ? excerptInput.value.trim() : '';
    if (text) {
      previewExcerpt.textContent = text;
      previewExcerpt.style.fontFamily = (excerptFontFamilySelect && excerptFontFamilySelect.value) ? excerptFontFamilySelect.value : "system-ui, sans-serif";
      previewExcerptContainer.style.display = 'block';
    } else {
      previewExcerptContainer.style.display = 'none';
    }
  }

  function updateContentFont() {
    const previewContent = document.getElementById('preview-content');
    if (!previewContent) return;
    const selectedFont = (contentFontFamilySelect && contentFontFamilySelect.value) ? contentFontFamilySelect.value : "system-ui, sans-serif";
    previewContent.style.fontFamily = selectedFont;

    // Apply font styling inside the active TinyMCE editor iframe
    if (typeof tinymce !== 'undefined') {
      const editor = tinymce.get('id_content');
      if (editor && editor.dom) {
        editor.dom.setStyle(editor.getBody(), 'font-family', selectedFont);
      }
    }
  }

  function updateAuthor() {
    if (!previewAuthor) return;
    if (authorSelect) {
      const selectedOption = authorSelect.options[authorSelect.selectedIndex];
      previewAuthor.textContent = selectedOption ? selectedOption.text : 'Admin';
    } else {
      previewAuthor.textContent = 'Admin';
    }
  }

  function updateCoverImage() {
    if (!previewCoverImage || !previewCoverPlaceholder) return;
    
    const position = coverPositionInput ? coverPositionInput.value.trim() : 'center center';
    previewCoverImage.style.objectPosition = position || 'center center';

    if (coverImageInput && coverImageInput.files && coverImageInput.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        previewCoverImage.src = e.target.result;
        previewCoverImage.style.display = 'block';
        previewCoverPlaceholder.style.display = 'none';
      }
      reader.readAsDataURL(coverImageInput.files[0]);
    } else {
      const existingLink = document.querySelector('.field-cover_image a');
      if (existingLink) {
        previewCoverImage.src = existingLink.href;
        previewCoverImage.style.display = 'block';
        previewCoverPlaceholder.style.display = 'none';
      } else {
        previewCoverImage.style.display = 'none';
        previewCoverPlaceholder.style.display = 'block';
      }
    }
  }

  if (titleInput) titleInput.addEventListener('input', updateTitle);
  if (boldCheckbox) boldCheckbox.addEventListener('change', updateTitle);
  if (italicCheckbox) italicCheckbox.addEventListener('change', updateTitle);
  if (fontSizeSelect) fontSizeSelect.addEventListener('change', updateTitle);
  if (titleFontFamilySelect) titleFontFamilySelect.addEventListener('change', updateTitle);
  if (excerptFontFamilySelect) excerptFontFamilySelect.addEventListener('change', updateExcerpt);
  if (contentFontFamilySelect) contentFontFamilySelect.addEventListener('change', updateContentFont);
  if (colorInput) {
    colorInput.addEventListener('input', updateTitle);
    colorInput.addEventListener('change', updateTitle);
  }
  if (excerptInput) excerptInput.addEventListener('input', updateExcerpt);
  if (coverImageInput) coverImageInput.addEventListener('change', updateCoverImage);
  if (coverPositionInput) coverPositionInput.addEventListener('input', updateCoverImage);
  if (authorSelect) authorSelect.addEventListener('change', updateAuthor);

  updateTitle();
  updateExcerpt();
  updateAuthor();
  updateCoverImage();
  updateContentFont();

  const now = new Date();
  const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
  if (previewDate) previewDate.textContent = now.toLocaleDateString('en-US', dateOptions);
});
</script>
{% endblock %}

{% block after_field_sets %}
<div class="module post-preview-module" style="margin-top: 40px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.06); background: white;">
  <h2 style="background: #f8fafc; border-bottom: 1px solid #e2e8f0; margin: 0; padding: 18px 24px; font-size: 17px; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 8px;">
    <span>✨ Real-time Post Preview</span>
  </h2>
  
  <div style="padding: 40px 30px; max-width: 800px; margin: 0 auto; box-sizing: border-box;">
    <!-- Mock Post Header -->
    <header style="margin-bottom: 30px; text-align: center;">
      <h1 id="preview-title" style="margin: 0 0 15px 0; font-family: 'Outfit', 'Inter', system-ui, sans-serif; line-height: 1.25; word-wrap: break-word; font-weight: 700;">
        Untitled Post
      </h1>
      
      <div style="color: #64748b; font-size: 14px; font-family: system-ui, sans-serif; font-weight: 500;">
        By <span id="preview-author" style="color: #4f46e5; font-weight: 600;">Author</span> | <span id="preview-date">Today</span>
      </div>
    </header>
    
    <!-- Mock Cover Image -->
    <div id="preview-cover-container" style="width: 100%; height: 380px; background-color: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 12px; overflow: hidden; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; position: relative;">
      <img id="preview-cover-image" src="" alt="Cover Preview" style="width: 100%; height: 100%; object-fit: cover; display: none;">
      <div id="preview-cover-placeholder" style="color: #94a3b8; font-family: system-ui, sans-serif; text-align: center; padding: 20px;">
        <span style="font-size: 44px; display: block; margin-bottom: 12px; filter: grayscale(0.2);">📸</span>
        <span style="font-weight: 500; font-size: 15px; color: #64748b;">No cover image selected</span>
      </div>
    </div>
    
    <!-- Mock Excerpt -->
    <div id="preview-excerpt-container" style="border-left: 4px solid #6366f1; padding: 5px 0 5px 20px; margin-bottom: 35px; display: none;">
      <p id="preview-excerpt" style="font-style: italic; color: #334155; font-size: 18px; line-height: 1.6; margin: 0; font-weight: 500;"></p>
    </div>
    
    <!-- Mock Content Body -->
    <article id="preview-content" class="rich-text-content" style="font-family: system-ui, sans-serif; font-size: 16px; line-height: 1.85; color: #334155; word-wrap: break-word;">
      <p style="color: #94a3b8; font-style: italic; text-align: center; padding: 20px 0;">Start typing in the content editor to see your post body layout here...</p>
    </article>
  </div>
</div>

<style>
  #preview-title {
    transition: all 0.15s ease-in-out;
  }
  .rich-text-content p {
    margin-bottom: 1.5em;
  }
  .rich-text-content h2 {
    font-size: 1.6em;
    margin-top: 1.6em;
    margin-bottom: 0.6em;
    font-weight: 600;
    color: #1e293b;
  }
  .rich-text-content h3 {
    font-size: 1.3em;
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    font-weight: 600;
    color: #334155;
  }
  .rich-text-content ul, .rich-text-content ol {
    margin-bottom: 1.5em;
    padding-left: 24px;
  }
  .rich-text-content li {
    margin-bottom: 0.6em;
  }
  .rich-text-content blockquote {
    border-left: 4px solid #e2e8f0;
    padding-left: 16px;
    font-style: italic;
    color: #475569;
    margin: 1.5em 0;
  }
</style>
{% endblock %}
