{% extends "admin/base.html" %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">
    <span style="font-family: 'Playfair Display', serif; font-weight: bold; font-style: italic; letter-spacing: 0.5px; color: var(--primary-fg);">Fun With Art</span> 
    <span style="font-family: 'Lato', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--link-hover-color); margin-left: 8px; opacity: 0.9;">Studio Admin</span>
  </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Lato:wght@300;400;700&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
    /* Clean, Professional Terracotta & Cream Theme using native Django CSS variables */
    :root {
        --primary: #2a1f1a;
        --primary-fg: #fdfbf9;
        --secondary: #3d302a;
        --secondary-fg: #fdfbf9;
        --accent: #c4896a;
        --accent-fg: #ffffff;
        --body-bg: #fdfbf9;
        --body-fg: #3d302a;
        --body-quiet-color: #8c7d74;
        --border-color: #eadecf;
        
        --heading-color: #2a1f1a;
        
        --breadcrumbs-bg: #f8f4ef;
        --breadcrumbs-fg: #7a6e67;
        --breadcrumbs-link-fg: #c4896a;
        
        --link-color: #c4896a;
        --link-hover-color: #d7a88d;
        --link-selected-color: #c4896a;
        
        --button-bg: #2a1f1a;
        --button-hover-bg: #c4896a;
        
        --default-button-bg: #c4896a;
        --default-button-hover-bg: #2a1f1a;
    }

    /* Native dark mode overrides */
    @media (prefers-color-scheme: dark) {
        :root {
            --primary: #1c1411;
            --primary-fg: #fdfbf9;
            --secondary: #2a1f1a;
            --secondary-fg: #fdfbf9;
            --accent: #d7a88d;
            --accent-fg: #1c1411;
            --body-bg: #1c1411;
            --body-fg: #fdfbf9;
            --body-quiet-color: #8c7d74;
            --border-color: #3d302a;
            
            --heading-color: #fdfbf9;
            
            --breadcrumbs-bg: #2a1f1a;
            --breadcrumbs-fg: #8c7d74;
            --breadcrumbs-link-fg: #d7a88d;
            
            --link-color: #d7a88d;
            --link-hover-color: #fdfbf9;
            --link-selected-color: #d7a88d;
            
            --button-bg: #d7a88d;
            --button-hover-bg: #c4896a;
            
            --default-button-bg: #c4896a;
            --default-button-hover-bg: #d7a88d;
        }
    }

    /* Base Font & Typography Override */
    body, input, select, textarea, button {
        font-family: 'Lato', sans-serif !important;
    }

    h1, h2, h3, .module h2, caption {
        font-family: 'Playfair Display', serif !important;
        font-weight: 600 !important;
        color: var(--heading-color) !important;
    }

    /* Smooth styling for modules, buttons, and tables */
    .module, #changelist, #changelist-filter, .aligned, .inline-group, #content-related {
        border: 1px solid var(--border-color) !important;
        border-radius: 8px !important;
        box-shadow: 0 4px 12px rgba(107, 63, 48, 0.02) !important;
        overflow: hidden !important;
    }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        border-radius: 6px !important;
        font-family: 'Syne', sans-serif !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
    }

    input[type=text], input[type=password], input[type=email], input[type=number], textarea, select {
        border: 1.5px solid var(--border-color) !important;
        border-radius: 6px !important;
        padding: 6px 10px !important;
    }

    /* Custom Centered Premium Card for Login page */
    body.login {
        background: radial-gradient(circle at top left, var(--body-bg) 0%, var(--breadcrumbs-bg) 100%) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
        margin: 0 !important;
        padding: 20px !important;
        box-sizing: border-box !important;
    }

    body.login div#container {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        width: 100% !important;
        max-width: 440px !important;
        background: var(--body-bg) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 16px !important;
        box-shadow: 0 12px 36px rgba(42, 31, 26, 0.08) !important;
        padding: 40px 30px !important;
        box-sizing: border-box !important;
        margin: 0 auto !important;
    }

    body.login #header {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        text-align: center !important;
        margin-bottom: 24px !important;
    }

    body.login #site-name a span {
        color: var(--primary) !important;
        font-size: 1.8rem !important;
    }

    body.login #site-name a span:last-child {
        color: var(--body-quiet-color) !important;
        font-size: 0.7rem !important;
    }

    body.login #content {
        padding: 0 !important;
        background: transparent !important;
        min-height: auto !important;
    }

    body.login .form-row {
        padding: 8px 0 !important;
        border: none !important;
        display: flex !important;
        flex-direction: column !important;
    }

    body.login .form-row label {
        font-weight: 700 !important;
        font-size: 0.8rem !important;
        margin-bottom: 6px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px;
    }

    body.login .form-row input[type=text], body.login .form-row input[type=password] {
        width: 100% !important;
        box-sizing: border-box !important;
    }

    body.login .submit-row {
        background: transparent !important;
        border: none !important;
        padding: 16px 0 0 0 !important;
        margin: 0 !important;
    }

    body.login .submit-row input[type=submit] {
        width: 100% !important;
        background: var(--primary) !important;
        color: var(--primary-fg) !important;
        padding: 12px !important;
    }

    body.login .submit-row input[type=submit]:hover {
        background: var(--accent) !important;
        color: var(--accent-fg) !important;
    }
</style>
{% endblock %}
